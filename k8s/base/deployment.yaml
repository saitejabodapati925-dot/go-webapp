apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-webapp
  labels:
    app.kubernetes.io/name: go-webapp
    app.kubernetes.io/part-of: stackpilot-academy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: go-webapp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: go-webapp
        app.kubernetes.io/part-of: stackpilot-academy
    spec:
      containers:
        - name: go-webapp
          image: app-image:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /home
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /home
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
