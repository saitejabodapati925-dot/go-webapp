name: CD

on:
  workflow_call:
    inputs:
      image_name:
        description: Container image name to deploy
        required: true
        type: string
      image_tag:
        description: Container image tag to deploy
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_name:
        description: Optional image name to deploy
        required: false
        type: string
      image_tag:
        description: Optional image tag to deploy instead of the current commit SHA tag
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: go-webapp-cd-main
  cancel-in-progress: true

env:
  MANIFEST_PATH: k8s/overlays/prod/kustomization.yaml
  DEFAULT_IMAGE_NAME: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
  REQUESTED_IMAGE_NAME: ${{ inputs.image_name }}
  REQUESTED_IMAGE_TAG: ${{ inputs.image_tag }}

jobs:
  update-gitops-manifest:
    name: Update Argo CD target manifest
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_call' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main

      - name: Resolve deploy image tag
        id: image
        run: |
          if [[ -n "${REQUESTED_IMAGE_NAME}" ]]; then
            echo "name=${REQUESTED_IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${DEFAULT_IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          fi

          if [[ -n "${REQUESTED_IMAGE_TAG}" ]]; then
            echo "tag=${REQUESTED_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update production image tag
        env:
          DEPLOY_IMAGE_NAME: ${{ steps.image.outputs.name }}
          DEPLOY_IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          sed -i "s#^    newName: .*#    newName: ${DEPLOY_IMAGE_NAME}#" "${MANIFEST_PATH}"
          sed -i "s/^    newTag: .*/    newTag: ${DEPLOY_IMAGE_TAG}/" "${MANIFEST_PATH}"
          grep -n "newName:\\|newTag:" "${MANIFEST_PATH}"

      - name: Commit manifest update
        env:
          DEPLOY_IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          if git diff --quiet -- "${MANIFEST_PATH}"; then
            echo "Manifest already points at ${MANIFEST_PATH} tag ${DEPLOY_IMAGE_TAG}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${MANIFEST_PATH}"
          git commit -m "Deploy go-webapp ${DEPLOY_IMAGE_TAG}"
          git push origin HEAD:main
